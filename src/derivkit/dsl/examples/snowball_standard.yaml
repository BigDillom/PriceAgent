# Standard knock-in/knock-out snowball (CSI1000-style terms).
# MC engine with fixed seed for reproducible sandbox grading.
task: price
market:
  valuation_date: "2024-01-05"
  underlyings:
    - id: CSI1000
      asset_class: index
      spot: 100.0
  rates:
    - id: CN_RF
      kind: constant
      value: 0.05
      day_count: ACT/365
      compounding: continuous
  vols:
    - id: CSI1000
      kind: constant
      value: 0.2
      underlying_id: CSI1000
product:
  type: snowball.standard
  params:
    s0: 100
    barrier_out: 103
    barrier_in: 80
    coupon_out: 0.113
    maturity: 1y
    lock_term: 3m
    margin_lvl: 1.0
engine:
  method: mc
  params:
    n_paths: 100000
output:
  fields: [pv]
  tolerance:
    pv: 1.0
  deterministic: true
  seed: 42
