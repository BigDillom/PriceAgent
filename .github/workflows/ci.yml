name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Format check
        run: black --check .
      - name: Test
        run: pytest -m "not perf" --cov=derivkit --cov-report=term-missing --cov-fail-under=85
      - name: Doc link check
        run: python scripts/check_doc_links.py

  perf:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Performance benchmarks
        run: python benchmarks/run_benchmarks.py --compare --json benchmarks/report.json
      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: benchmarks/report.json
          if-no-files-found: ignore
